<html>
    <head>
		<meta charset="utf-8">
		<title>PGN Train - Train On Your PGNs</title>
		<style type="text/css">
			body {
				font-family: sans-serif;
				background-color: #f0f0f0;
				margin: 24px;
				color: #222;
			}
			h1 {
				margin: 0 0 16px 0;
				font-size: 22px;
				color: #1a1a1a;
			}
			.no-bullets, .no-bullets li {
				list-style-type: none;
				align: left;
			}
			table {
				border-collapse: collapse;
				background: white;
				border-radius: 8px;
				box-shadow: 0 1px 4px rgba(0,0,0,0.12);
				overflow: hidden;
			}
			td {
				border: 1px solid #ddd;
				padding: 12px 16px;
				vertical-align: top;
			}
			.col-header {
				font-size: 15px;
				font-weight: 600;
				margin: 0 0 10px 0;
			}
			.scrollable-container {
				overflow-y: auto;
				height: 600px;
			}
			.textarea-container {
				position: relative;
				display: inline-block;
			}
			.highlight-backdrop {
				position: absolute;
				top: 0;
				left: 0;
				margin: 0;
				white-space: pre-wrap;
				word-wrap: break-word;
				color: transparent;
				overflow: auto;
				pointer-events: none;
				font-family: monospace;
				font-size: 13px;
				background-color: white;
				z-index: 1;
				box-sizing: border-box;
				scrollbar-width: thin;
				scrollbar-color: transparent transparent;
			}
			.highlight-backdrop::-webkit-scrollbar {
				width: 0;
				height: 0;
			}
			.highlight-backdrop .highlight {
				background-color: yellow;
				color: transparent;
			}
			.highlight-backdrop .highlight-diff-red {
				background-color: #8b0000;
				color: transparent;
			}
			.highlight-backdrop .highlight-diff-blue {
				background-color: #00008b;
				color: transparent;
			}
			#pgn_paste {
				position: relative;
				background-color: transparent;
				font-family: monospace;
				font-size: 13px;
				line-height: normal;
				resize: none;
				z-index: 2;
			}
			#user_text {
				box-sizing: border-box;
				background-color: #f0f0f0;
				color: #444;
				border: 1px solid #ccc;
				border-radius: 4px;
				font-size: 13px;
				resize: horizontal;
			}
			.lichess-inputs input {
				display: block;
				margin-bottom: 6px;
				padding: 5px 7px;
				border: 1px solid #ccc;
				border-radius: 4px;
				font-size: 13px;
			}
			.lichess-inputs .count-row {
				display: flex;
				align-items: center;
				gap: 6px;
				margin-bottom: 6px;
			}
			.lichess-inputs .count-row input {
				width: 50px;
				margin-bottom: 0;
			}
			.btn {
				padding: 8px 22px;
				font-size: 14px;
				border: none;
				border-radius: 5px;
				cursor: pointer;
				background-color: #3d5a3e;
				color: white;
				transition: background-color 0.15s;
			}
			.btn:hover {
				background-color: #2e452f;
			}
		</style>
	</head>
    <body>
		<h1>PGN Train</h1>
		<table>
			<tr>
				<td><img src="board.png" id="board"></td>
				<td>
					<div class="col-header">Stored PGNs</div>
					<div id="login-container">
						<!-- Login button will be replaced with user's name after login -->
						<div id="g_id_onload"
							 data-client_id="1088260192283-c62v3ctm2lj1jjtlml2pkmuvl0hpjron.apps.googleusercontent.com"
							 data-context="signin"
							 data-ux_mode="popup"
							 data-callback="handleCredentialResponse"
							 data-auto_prompt="false">
						</div>

						<div class="g_id_signin" data-type="standard"></div>
					</div>
					<!-- Placeholder for user's name -->
					<div id="user-info" style="display: none;">
						<span id="user-name"></span>
                        <br>
						<form id="uploadForm">
							<input type="file" id="fileInput" name="file" multiple required />
                            <br>
							<button type="submit">Upload</button>
						</form>
						<div id="response"></div>
					</div>
					<div class="scrollable-container">
						<ul class="no-bullets" id="pgn_list">
						</ul>
					</div>
				</td>
				<td>
					<div class="col-header">Lichess Games</div>
					<div class="lichess-inputs">
						<input type="text" id="lichess-username" placeholder="Lichess username" style="width:160px">
						<input type="password" id="lichess-token" placeholder="API token (optional)" style="width:160px">
						<div class="count-row">
							<input type="number" id="lichess-count" value="10" min="1" max="200" style="width:50px"> games
							<button id="lichess-fetch">Fetch</button>
						</div>
					</div>
					<span id="lichess-status" style="font-size:small"></span>
					<div class="scrollable-container">
						<ul class="no-bullets" id="lichess-game-list"></ul>
					</div>
				</td>
			</tr>
		</table>
		<br>
		<div class="textarea-container">
			<div id="pgn_paste_backdrop" class="highlight-backdrop"></div>
			<textarea id="pgn_paste"></textarea>
		</div>
		<br>
		<textarea id="user_text"></textarea>
		<br><br>
		<button id="clear" class="btn">Clear</button>
		<button id="rotate" class="btn">Rotate</button>
		<button id="learn" class="btn">Learn</button>


		<script src="https://accounts.google.com/gsi/client" async defer></script>
		<script src="auth.js" async defer></script>

        <script src="pgn_storage.js"></script>
        <script src="lichess.js"></script>
		<script src="common.js"></script>
        <script src="effects.js"></script>
		<script src="move_tree.js"></script>
        <script src="mainchess.js" defer></script>
        <script src="fakeuser.js" defer></script>
    </body>
</html>
